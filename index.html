<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UpscaleAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   TOKENS — light mode default, dark mode override
═══════════════════════════════════════════════════════ */
:root, [data-theme="light"] {
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22;
  --color-success-hover: #2e5c10;
  --color-success-highlight: #d4dfcc;
  --color-error: #a12c7b;
  --color-error-highlight: #e0ced7;
  --color-gold: #d19900;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --font-body: 'Geist', system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem;
}

[data-theme="dark"],
@media (prefers-color-scheme: dark) { :root:not([data-theme]) {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #252422;
  --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #797876;
  --color-text-faint: #5a5957;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-highlight: #253535;
  --color-success: #6daa45;
  --color-success-hover: #4d8f25;
  --color-success-highlight: #2a3a25;
  --color-error: #d163a7;
  --color-error-highlight: #3a2535;
  --color-gold: #e8af34;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
}}

[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #252422;
  --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #797876;
  --color-text-faint: #5a5957;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-highlight: #253535;
  --color-success: #6daa45;
  --color-success-hover: #4d8f25;
  --color-success-highlight: #2a3a25;
  --color-error: #d163a7;
  --color-error-highlight: #3a2535;
  --color-gold: #e8af34;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
/* ═══════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.6;
}
img, video { display: block; max-width: 100%; height: auto; }
button {
  cursor: pointer; background: none; border: none;
  font: inherit; color: inherit;
  transition: color var(--transition), background var(--transition),
              border-color var(--transition), box-shadow var(--transition);
}
:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 3px;
  border-radius: var(--radius-sm);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ═══════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════ */
.app { display: grid; grid-template-rows: auto 1fr; min-height: 100dvh; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(12px);
}

.logo { display: flex; align-items: center; gap: var(--space-2); }
.logo svg { flex-shrink: 0; }
.logo-text { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.03em; }

main {
  display: flex; flex-direction: column; align-items: center;
  padding: var(--space-10) var(--space-4);
  gap: var(--space-8);
  max-width: 900px; margin-inline: auto; width: 100%;
}

/* ═══════════════════════════════════════════════════════
   ENDPOINT BAR
═══════════════════════════════════════════════════════ */
.endpoint-bar {
  width: 100%; display: flex; gap: var(--space-2); align-items: center;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-sm);
  transition: border-color var(--transition);
}
.endpoint-bar:focus-within { border-color: var(--color-primary); }

.endpoint-label {
  font-size: var(--text-xs); color: var(--color-text-muted);
  white-space: nowrap; font-family: var(--font-mono);
}
.endpoint-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-text);
}
.endpoint-input::placeholder { color: var(--color-text-faint); }

.endpoint-status {
  display: flex; align-items: center; gap: var(--space-1);
  font-size: var(--text-xs); color: var(--color-text-muted);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-full);
  border: 1px solid var(--color-border);
  white-space: nowrap; cursor: pointer;
  transition: all var(--transition);
}
.endpoint-status:hover { border-color: var(--color-primary); color: var(--color-text); }
.endpoint-status:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-faint); flex-shrink: 0; }
.status-dot.checking { background: var(--color-gold); animation: pulse 1s ease-in-out infinite; }
.status-dot.online   { background: var(--color-success); }
.status-dot.offline  { background: var(--color-error); }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

/* ═══════════════════════════════════════════════════════
   UPLOAD ZONE
═══════════════════════════════════════════════════════ */
.upload-section { width: 100%; display: flex; flex-direction: column; gap: var(--space-4); }

.upload-zone {
  position: relative;
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-xl);
  background: var(--color-surface);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--space-12) var(--space-8); gap: var(--space-3);
  cursor: pointer; transition: all var(--transition); text-align: center;
  min-height: 180px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--color-primary);
  background: color-mix(in oklch, var(--color-primary) 4%, var(--color-surface));
}
.upload-zone.has-file {
  border-style: solid; border-color: var(--color-primary);
  padding: var(--space-6) var(--space-8);
}
/* Full-zone click target — sits above content but below pointer events on children */
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2;
  width: 100%; height: 100%;
}

.upload-icon {
  width: 48px; height: 48px; border-radius: var(--radius-lg);
  background: var(--color-surface-offset);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  transition: all var(--transition);
  pointer-events: none;
}
.upload-zone:hover .upload-icon,
.upload-zone.drag-over .upload-icon,
.upload-zone.has-file .upload-icon {
  background: color-mix(in oklch, var(--color-primary) 14%, var(--color-surface-offset));
  color: var(--color-primary);
}

.upload-title { font-size: var(--text-base); font-weight: 600; pointer-events: none; }
.upload-sub   { font-size: var(--text-sm); color: var(--color-text-muted); pointer-events: none; }
.upload-meta  {
  font-size: var(--text-xs); color: var(--color-text-faint);
  font-family: var(--font-mono); pointer-events: none;
}

/* ── Controls Row ── */
.controls {
  display: flex; gap: var(--space-3); align-items: center; flex-wrap: wrap;
}
.scale-group {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); color: var(--color-text-muted);
}
.scale-btns {
  display: flex; border-radius: var(--radius-md);
  overflow: hidden; border: 1px solid var(--color-border);
}
.scale-btn {
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm); font-weight: 500;
  background: var(--color-surface); color: var(--color-text-muted);
  border: none; cursor: pointer; transition: all var(--transition);
}
.scale-btn:not(:last-child) { border-right: 1px solid var(--color-border); }
.scale-btn.active { background: var(--color-primary); color: #fff; }
.scale-btn:hover:not(.active) { background: var(--color-surface-offset); color: var(--color-text); }

.btn-primary {
  margin-left: auto;
  padding: var(--space-2) var(--space-6);
  border-radius: var(--radius-md);
  background: var(--color-primary); color: #fff;
  font-weight: 600; font-size: var(--text-sm);
  display: flex; align-items: center; gap: var(--space-2);
  transition: all var(--transition);
  min-width: 110px; justify-content: center;
}
.btn-primary:hover:not(:disabled) {
  background: var(--color-primary-hover);
  box-shadow: var(--shadow-md);
}
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.btn-primary.loading .spinner { display: block; }
.btn-primary.loading .btn-label { opacity: 0.7; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════════
   STATUS / ERROR MESSAGE BAR
═══════════════════════════════════════════════════════ */
.msg-bar {
  width: 100%; border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-5);
  font-size: var(--text-sm); display: none;
  word-break: break-word;
}
.msg-bar.error { display: block; background: var(--color-error-highlight); color: var(--color-error); }
.msg-bar.info  { display: block; background: var(--color-primary-highlight); color: var(--color-primary); }

/* ═══════════════════════════════════════════════════════
   PREVIEW PANEL
═══════════════════════════════════════════════════════ */
.preview-panel { width: 100%; display: none; flex-direction: column; gap: var(--space-4); }
.preview-panel.visible { display: flex; }

.preview-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);
}
@media (max-width: 600px) {
  .preview-grid { grid-template-columns: 1fr; }
}

.preview-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-sm);
}
.preview-card-header {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
  display: flex; align-items: center; justify-content: space-between;
  font-size: var(--text-xs); color: var(--color-text-muted);
  font-family: var(--font-mono);
}
.badge {
  padding: 2px var(--space-2); border-radius: var(--radius-full);
  background: var(--color-surface-offset); font-size: var(--text-xs);
  color: var(--color-text-muted);
}
.badge.result { background: var(--color-success-highlight); color: var(--color-success); }

.preview-img-wrap {
  aspect-ratio: 1 / 1; overflow: hidden;
  background: var(--color-surface-offset);
  display: flex; align-items: center; justify-content: center; position: relative;
}
.preview-img-wrap img {
  width: 100%; height: 100%; object-fit: contain; display: block;
}

/* Skeleton / waiting state */
.skeleton-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--space-3); color: var(--color-text-faint); font-size: var(--text-sm);
  background: var(--color-surface-offset);
}
.skeleton-wrap.hidden { display: none; }

@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skeleton-wrap.processing {
  background: linear-gradient(
    90deg,
    var(--color-surface-offset) 25%,
    var(--color-surface-dynamic) 50%,
    var(--color-surface-offset) 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  color: transparent;
}
.skeleton-wrap.processing svg,
.skeleton-wrap.processing span { opacity: 0; }

/* ── Download Bar ── */
.download-bar {
  display: none;
  align-items: center; justify-content: space-between;
  background: var(--color-success-highlight);
  border: 1px solid color-mix(in oklch, var(--color-success) 40%, transparent);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-5); gap: var(--space-3);
  flex-wrap: wrap;
}
.download-bar.visible { display: flex; }

.download-info { display: flex; flex-direction: column; gap: 2px; }
.download-info strong { font-size: var(--text-sm); color: var(--color-success); font-weight: 600; }
.download-info span { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }

.btn-download {
  padding: var(--space-2) var(--space-5);
  border-radius: var(--radius-md);
  background: var(--color-success); color: #fff;
  font-weight: 600; font-size: var(--text-sm);
  display: flex; align-items: center; gap: var(--space-2);
  transition: all var(--transition);
  flex-shrink: 0;
}
.btn-download:hover { background: var(--color-success-hover); box-shadow: var(--shadow-sm); }

/* ═══════════════════════════════════════════════════════
   HEADER CONTROLS
═══════════════════════════════════════════════════════ */
.theme-toggle {
  padding: var(--space-2); border-radius: var(--radius-md);
  color: var(--color-text-muted);
  display: flex; align-items: center;
  transition: all var(--transition);
}
.theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

/* ── Help Footer ── */
.help-text {
  font-size: var(--text-xs); color: var(--color-text-faint);
  text-align: center; max-width: 64ch;
}
.help-text a { color: var(--color-primary); text-decoration: none; }
.help-text a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="app">

<!-- ══ HEADER ═══════════════════════════════════════════ -->
<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="UpscaleAI logo" role="img">
      <rect width="28" height="28" rx="7" fill="var(--color-primary)"/>
      <path d="M8 20L14 8L20 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 16h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20.5" cy="8.5" r="2.5" fill="white" opacity="0.5"/>
    </svg>
    <span class="logo-text">UpscaleAI</span>
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode">
    <!-- icon injected by JS -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<!-- ══ MAIN ══════════════════════════════════════════════ -->
<main>

  <!-- Endpoint bar -->
  <div class="endpoint-bar" role="group" aria-label="API endpoint configuration">
    <span class="endpoint-label" id="api-label">API</span>
    <input
      class="endpoint-input"
      id="apiUrl"
      type="url"
      aria-labelledby="api-label"
      placeholder="https://your-app.railway.app"
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    >
    <button class="endpoint-status" id="statusBtn" onclick="checkHealth()" aria-label="Check API health">
      <span class="status-dot" id="statusDot" aria-hidden="true"></span>
      <span id="statusText">Check</span>
    </button>
  </div>

  <!-- Upload section -->
  <div class="upload-section">
    <div class="upload-zone" id="dropZone" role="button" tabindex="0"
         aria-label="Upload image — click or drag and drop">
      <label for="fileInput" class="sr-only">Select image file</label>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
      <div class="upload-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 5 17 10"/><line x1="12" y1="5" x2="12" y2="15"/>
        </svg>
      </div>
      <span class="upload-title" id="uploadTitle">Drop an image here</span>
      <span class="upload-sub">JPEG · PNG · WebP · max 20 MB</span>
      <span class="upload-sub" style="font-size:var(--text-xs);opacity:0.6">or paste from clipboard</span>
      <span class="upload-meta" id="uploadMeta"></span>
    </div>

    <div class="controls">
      <div class="scale-group">
        <span id="scale-label">Upscale</span>
        <div class="scale-btns" role="group" aria-labelledby="scale-label">
          <button class="scale-btn" id="scale2" onclick="setScale(2)" aria-pressed="false">2×</button>
          <button class="scale-btn active" id="scale4" onclick="setScale(4)" aria-pressed="true">4×</button>
        </div>
      </div>
      <button class="btn-primary" id="upscaleBtn" disabled onclick="runUpscale()">
        <span class="spinner" aria-hidden="true"></span>
        <span class="btn-label">Upscale</span>
      </button>
    </div>
  </div>

  <!-- Status message -->
  <div class="msg-bar" id="msgBar" role="alert" aria-live="polite"></div>

  <!-- Preview panel -->
  <div class="preview-panel" id="previewPanel" aria-label="Image comparison">
    <div class="preview-grid">

      <!-- Original -->
      <div class="preview-card">
        <div class="preview-card-header">
          <span>Original</span>
          <span class="badge" id="origSize">—</span>
        </div>
        <div class="preview-img-wrap">
          <img id="origImg" alt="" loading="lazy" decoding="async">
        </div>
      </div>

      <!-- Result -->
      <div class="preview-card">
        <div class="preview-card-header">
          <span>Upscaled</span>
          <span class="badge result" id="resultSize">—</span>
        </div>
        <div class="preview-img-wrap">
          <div class="skeleton-wrap" id="resultSkeleton" aria-hidden="true">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v4l3 3"/>
            </svg>
            <span id="skeletonLabel">Waiting…</span>
          </div>
          <img id="resultImg" alt="Upscaled result" loading="lazy" decoding="async" style="display:none">
        </div>
      </div>

    </div>

    <!-- Download bar -->
    <div class="download-bar" id="downloadBar" role="status">
      <div class="download-info">
        <strong>✓ Upscale complete</strong>
        <span id="downloadMeta"></span>
      </div>
      <button class="btn-download" id="downloadBtn" onclick="downloadResult()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </button>
    </div>
  </div>

  <p class="help-text">
    Paste your <strong>Railway backend URL</strong> above, then drop an image and hit Upscale.
    &mdash; <a href="https://github.com/xinntao/Real-ESRGAN" target="_blank" rel="noopener noreferrer">Powered by Real-ESRGAN</a>
  </p>

</main>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// PASTE FROM CLIPBOARD (Ctrl+V / Cmd+V)
// ═══════════════════════════════════════════════════════
document.addEventListener('paste', e => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      e.preventDefault();
      handleFile(item.getAsFile());
      return;
    }
  }
});

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {
  file: null,
  scale: 4,
  resultBlob: null,
  resultObjectUrl: null,   // tracked for revocation
  resultFilename: 'upscaled.png',
};

// ═══════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════
(function initTheme() {
  const root   = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

  applyTheme(theme);

  toggle.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    applyTheme(theme);
  });

  function applyTheme(t) {
    root.setAttribute('data-theme', t);
    toggle.setAttribute('aria-label', `Switch to ${t === 'dark' ? 'light' : 'dark'} mode`);
    toggle.innerHTML = t === 'dark'
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
           <circle cx="12" cy="12" r="5"/>
           <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
         </svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
           <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
         </svg>`;
  }
})();

// ═══════════════════════════════════════════════════════
// ELEMENTS
// ═══════════════════════════════════════════════════════
const el = {
  apiUrl:         document.getElementById('apiUrl'),
  statusBtn:      document.getElementById('statusBtn'),
  statusDot:      document.getElementById('statusDot'),
  statusText:     document.getElementById('statusText'),
  dropZone:       document.getElementById('dropZone'),
  fileInput:      document.getElementById('fileInput'),
  uploadTitle:    document.getElementById('uploadTitle'),
  uploadMeta:     document.getElementById('uploadMeta'),
  scale2:         document.getElementById('scale2'),
  scale4:         document.getElementById('scale4'),
  upscaleBtn:     document.getElementById('upscaleBtn'),
  msgBar:         document.getElementById('msgBar'),
  previewPanel:   document.getElementById('previewPanel'),
  origImg:        document.getElementById('origImg'),
  origSize:       document.getElementById('origSize'),
  resultSkeleton: document.getElementById('resultSkeleton'),
  skeletonLabel:  document.getElementById('skeletonLabel'),
  resultImg:      document.getElementById('resultImg'),
  resultSize:     document.getElementById('resultSize'),
  downloadBar:    document.getElementById('downloadBar'),
  downloadMeta:   document.getElementById('downloadMeta'),
  downloadBtn:    document.getElementById('downloadBtn'),
};

// ═══════════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════════
el.fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

el.dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  el.dropZone.classList.add('drag-over');
});
el.dropZone.addEventListener('dragleave', e => {
  // only clear if leaving the zone itself, not a child
  if (!el.dropZone.contains(e.relatedTarget)) {
    el.dropZone.classList.remove('drag-over');
  }
});
el.dropZone.addEventListener('drop', e => {
  e.preventDefault();
  el.dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

// Keyboard activation for accessibility
el.dropZone.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    el.fileInput.click();
  }
});

const MAX_SIZE = 20 * 1024 * 1024; // mirror server limit

function handleFile(file) {
  if (!file) return;

  const allowed = ['image/jpeg', 'image/png', 'image/webp'];
  if (!allowed.includes(file.type)) {
    showMsg('Unsupported format. Use JPEG, PNG, or WebP.', 'error');
    return;
  }
  if (file.size > MAX_SIZE) {
    showMsg(`File is ${formatBytes(file.size)} — max allowed is 20 MB.`, 'error');
    return;
  }

  // Revoke previous result URL to avoid memory leak
  revokeResultUrl();
  state.file = file;
  state.resultBlob = null;

  const reader = new FileReader();
  reader.onerror = () => showMsg('Could not read the file. Try again.', 'error');
  reader.onload = ev => {
    el.origImg.src = ev.target.result;
    el.origImg.alt = `Original: ${file.name}`;
    el.origSize.textContent = formatBytes(file.size);

    el.uploadTitle.textContent = file.name.length > 40 ? file.name.slice(0,37)+'…' : file.name;
    el.uploadTitle.title = file.name;
    el.uploadMeta.textContent  = `${formatBytes(file.size)} · ${file.type.split('/')[1].toUpperCase()}`;
    el.dropZone.classList.add('has-file');

    resetResultPanel();
    el.previewPanel.classList.add('visible');
  };
  reader.readAsDataURL(file);

  el.upscaleBtn.disabled = false;
  clearMsg();
}

// ═══════════════════════════════════════════════════════
// SCALE TOGGLE
// ═══════════════════════════════════════════════════════
function setScale(n) {
  state.scale = n;
  el.scale2.classList.toggle('active', n === 2);
  el.scale4.classList.toggle('active', n === 4);
  el.scale2.setAttribute('aria-pressed', String(n === 2));
  el.scale4.setAttribute('aria-pressed', String(n === 4));
}

// ═══════════════════════════════════════════════════════
// HEALTH CHECK
// ═══════════════════════════════════════════════════════
async function checkHealth() {
  const url = getUrl();
  if (!url) { showMsg('Paste your Railway URL into the API bar first.', 'error'); return; }

  el.statusBtn.disabled = true;
  setStatus('checking', 'Checking…');
  clearMsg();

  try {
    const r = await fetch(`${url}/health`, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (d.status === 'ok') {
      const modelReady = d.model_x4_ready !== false; // default true for older backends
      setStatus('online', modelReady ? 'Online' : 'Weights missing');
      if (!modelReady) showMsg('Backend is up but model weights are still downloading. Wait ~60s and check again.', 'info');
    } else {
      setStatus('offline', 'Error');
    }
  } catch (e) {
    setStatus('offline', 'Offline');
    showMsg('Could not reach the API. Confirm the URL is correct and the service is awake on Railway.', 'error');
  } finally {
    el.statusBtn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════
// UPSCALE
// ═══════════════════════════════════════════════════════
async function runUpscale() {
  const url = getUrl();
  if (!url)        { showMsg('Paste your Railway URL into the API bar first.', 'error'); return; }
  if (!state.file) { showMsg('Select an image first.', 'error'); return; }

  // Lock UI
  el.upscaleBtn.disabled = true;
  el.upscaleBtn.classList.add('loading');
  el.upscaleBtn.querySelector('.btn-label').textContent = 'Upscaling…';
  el.scale2.disabled = true;
  el.scale4.disabled = true;
  clearMsg();

  // Skeleton shimmer
  revokeResultUrl();
  el.resultImg.style.display = 'none';
  el.resultImg.src = '';
  el.resultSkeleton.classList.remove('hidden');
  el.resultSkeleton.classList.add('processing');
  el.skeletonLabel.textContent = 'Processing… 0s';
  
  // Elapsed timer in skeleton
  let _timerInterval = null;
  let _timerStart = Date.now();
  const _tick = () => {
    const s = Math.floor((Date.now() - _timerStart) / 1000);
    el.skeletonLabel.textContent = `Processing… ${s}s (CPU inference is slow)`;
  };
  _timerInterval = setInterval(_tick, 1000);
  _tick();

  el.downloadBar.classList.remove('visible');
  el.resultSize.textContent = '—';

  try {
    const form = new FormData();
    form.append('file', state.file);
    
    // 10 MINUTE TIMEOUT FIX
    const r = await fetch(`${url}/upscale?scale=${state.scale}`, {
      method: 'POST',
      body: form,
      signal: AbortSignal.timeout(600_000), 
    });

    if (!r.ok) {
      let detail = `Server error ${r.status}`;
      try {
        const body = await r.json();
        detail = body.detail || detail;
      } catch { /* non-JSON body */ }
      throw new Error(detail);
    }

    const blob = await r.blob();
    if (!blob || blob.size === 0) throw new Error('Server returned an empty file.');

    const ext = blob.type.includes('png') ? 'png' : 'jpg';
    state.resultBlob     = blob;
    state.resultFilename = state.file.name.replace(/\.[^.]+$/, `_${state.scale}x.${ext}`);
    state.resultObjectUrl = URL.createObjectURL(blob);

    // Set onload BEFORE setting src
    el.resultImg.onload = () => {
      el.resultSkeleton.classList.add('hidden');
      el.resultSkeleton.classList.remove('processing');
      el.resultImg.style.display = 'block';
      el.resultSize.textContent = formatBytes(blob.size);
      el.downloadMeta.textContent = `${state.resultFilename} · ${formatBytes(blob.size)}`;
      el.downloadBar.classList.add('visible');
    };
    el.resultImg.onerror = () => {
      throw new Error('Result image failed to render. The file may be corrupt.');
    };
    el.resultImg.src = state.resultObjectUrl;
    el.resultImg.alt = `Upscaled ${state.scale}×: ${state.file.name}`;

  } catch (err) {
    el.resultSkeleton.classList.remove('processing');
    el.skeletonLabel.textContent = 'Failed — try again';
    
    const msg = err.name === 'TimeoutError'
      ? 'Request timed out after 10 minutes. Try a smaller image or 2x scale.'
      : (err.message || 'Unknown error');
    showMsg(msg.length > 250 ? msg.slice(0, 250) + '…' : msg, 'error');
  } finally {
    if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
    el.upscaleBtn.disabled  = false;
    el.upscaleBtn.classList.remove('loading');
    el.upscaleBtn.querySelector('.btn-label').textContent = 'Upscale';
    el.scale2.disabled = false;
    el.scale4.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════
// DOWNLOAD
// ═══════════════════════════════════════════════════════
function downloadResult() {
  if (!state.resultObjectUrl) return;
  const a = document.createElement('a');
  a.href     = state.resultObjectUrl;
  a.download = state.resultFilename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getUrl() {
  return el.apiUrl.value.trim().replace(/\/+$/, '');
}

function setStatus(cls, text) {
  el.statusDot.className = `status-dot ${cls}`;
  el.statusText.textContent = text;
}

function showMsg(text, type) {
  el.msgBar.textContent = text;
  el.msgBar.className   = `msg-bar ${type}`;
}

function clearMsg() {
  el.msgBar.className   = 'msg-bar';
  el.msgBar.textContent = '';
}

function formatBytes(b) {
  if (b < 1024)     return b + ' B';
  if (b < 1048576)  return (b / 1024).toFixed(0) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function revokeResultUrl() {
  if (state.resultObjectUrl) {
    URL.revokeObjectURL(state.resultObjectUrl);
    state.resultObjectUrl = null;
  }
}

function resetResultPanel() {
  revokeResultUrl();
  state.resultBlob = null;
  el.resultImg.style.display = 'none';
  el.resultImg.src = '';
  el.resultImg.onload  = null;
  el.resultImg.onerror = null;
  el.resultSkeleton.classList.remove('hidden', 'processing');
  el.skeletonLabel.textContent = 'Waiting…';
  el.resultSize.textContent = '—';
  el.downloadBar.classList.remove('visible');
}
</script>
</body>
</html>
